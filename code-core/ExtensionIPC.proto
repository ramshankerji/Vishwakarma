//
// Wire schema for host <-> extension-worker IPC (length-prefixed Protobuf Lite
// over anonymous pipes). See website/content/software/extensions.md.
// Schema evolution rules: never change existing tag numbers or field types;
// only add new optional fields; never reuse deprecated tag numbers.

syntax = "proto3";

package vishwakarma.extension.v1;

option optimize_for = LITE_RUNTIME;

// ---------- Host -> Worker ----------

message HostToWorker {
  oneof msg {
    ImportFileRequest import_file_request = 1;
  }
}

message ImportFileRequest {
  string file_name = 1;  // Display name only (no path); host performs all file I/O.
  bytes file_bytes = 2;  // Raw file content streamed to the sandboxed worker.
}

// ---------- Worker -> Host ----------

message WorkerToHost {
  oneof msg {
    CreateGeometryBatch create_geometry_batch = 1;
    WorkerLog log = 2;
    WorkerResult result = 3;  // Final message; worker exits after sending it.
    CreatePage2DBatch create_page2d_batch = 4;
    CreateAsset2DBatch create_asset2d_batch = 5;
  }
}

// Coordinates are SI meters in the model's global axes.
message StructuralNode {
  uint32 node_id = 1;
  double x = 2;
  double y = 3;
  double z = 4;
}

message StructuralMember {
  uint32 member_id = 1;
  uint32 start_node_id = 2;
  uint32 end_node_id = 3;
  // Vishwakarma catalog designation (SteelProfileCatalog.h), already mapped from
  // the STAAD table name by the worker (profile_mapping.py). Empty = no rolled
  // section mapped; the host draws such members as placeholder pipes.
  string profile_designation = 4;
}

message CreateGeometryBatch {
  repeated StructuralNode nodes = 1;
  repeated StructuralMember members = 2;
}

// 2D drawing elements imported into the currently open Page2D container.
// Coordinates and sizes are Page2D ComputerUnits (source drawing units are
// passed through unscaled by the DXF importer).

message Page2DLine {
  double x1 = 1;
  double y1 = 2;
  double x2 = 3;
  double y2 = 4;
}

message Page2DText {
  double x = 1;
  double y = 2;
  double height = 3;            // Text height in ComputerUnits.
  double rotation_radians = 4;
  uint32 justification = 5;     // Cad2DTextJustification numeric value (0..8).
  string text = 6;              // UTF-8 plain text; no inline formatting codes.
}

// Regular polygon (Vishwakarma's canonical closed round shape); a DXF circle
// arrives as a polygon with a high segment count.
message Page2DPolygon {
  double center_x = 1;
  double center_y = 2;
  double radius = 3;
  uint32 segment_count = 4;
  double rotation_degrees = 5;
}

message CreatePage2DBatch {
  repeated Page2DLine lines = 1;
  repeated Page2DText texts = 2;
  repeated Page2DPolygon polygons = 3;
}

// A 2D asset (DXF "block") definition with its master geometry. asset_key is a
// worker-local id (unique within one import session) that inserts reference;
// the host assigns the real object id and the user-visible random asset number.
// Master geometry is in the definition's own coordinate frame; base_x/base_y is
// the insert base point (DXF BLOCK base point). Reuses the Page2D element messages.
message Asset2DDefinitionImport {
  uint32 asset_key = 1;
  string name = 2;        // DXF block name; informational for now.
  double base_x = 3;
  double base_y = 4;
  repeated Page2DLine lines = 5;
  repeated Page2DText texts = 6;
  repeated Page2DPolygon polygons = 7;
}

// One placed instance of a definition on the currently open Page2D. The host bakes the
// transform into the instance's member records: member = insert + R(rotation) * S(scale)
// * (master - base). Zero / non-finite scales are rejected by the host.
message Asset2DInsertImport {
  uint32 asset_key = 1;   // References an Asset2DDefinitionImport.asset_key.
  double x = 2;           // Insert point in Page2D ComputerUnits.
  double y = 3;
  double scale_x = 4;           // Negative scale = mirror along that axis.
  double scale_y = 5;
  double rotation_degrees = 6;  // Counter-clockwise.
}

message CreateAsset2DBatch {
  repeated Asset2DDefinitionImport definitions = 1;
  repeated Asset2DInsertImport inserts = 2;
}

message WorkerLog {
  string text = 1;
}

message WorkerResult {
  bool success = 1;
  string error = 2;
  uint32 total_nodes = 3;
  uint32 total_members = 4;
  uint32 total_elements = 5;  // 2D imports: total Page2D elements sent.
}
