syntax = "proto3";

package vishwakarma.storage;

import "DataStorage_Common3D.proto";

option optimize_for = LITE_RUNTIME;

message FrustumOfPyramid {
  repeated Point3F vertices = 1;
  Color4F color_base = 2;
  Color4F color_top = 3;
  Color4F color_incline = 4;
}
