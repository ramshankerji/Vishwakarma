syntax = "proto3";

package vishwakarma.storage;

import "DataStorage_Common3D.proto";

option optimize_for = LITE_RUNTIME;

message Tee {
  Point3F center1 = 1;
  Point3F center2 = 2;
  float main_outside_diameter = 3;
  float main_inside_diameter = 4;
  float branch_angle_degrees = 5;
  float branch_length = 6;
  float branch_outside_diameter = 7;
  float branch_inside_diameter = 8;
  Color4F color_outer = 9;
  Color4F color_inner = 10;
  Color4F color_cap = 11;
}
