syntax = "proto3";

package vishwakarma.storage;

option optimize_for = LITE_RUNTIME;

message Polyline2DPoint {
  double x = 1;
  double y = 2;
}

message Polyline2D {
  repeated Polyline2DPoint points = 1;
  float line_weight = 2;
  uint32 line_weight_mode = 3;
  uint32 color_abgr = 4;
}
