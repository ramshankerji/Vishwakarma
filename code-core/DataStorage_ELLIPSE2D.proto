syntax = "proto3";

package vishwakarma.storage;

option optimize_for = LITE_RUNTIME;

message Ellipse2D {
  double center_x = 1;
  double center_y = 2;
  double radius_x = 3;
  double radius_y = 4;
  float line_weight = 5;
  uint32 line_weight_mode = 6;
  uint32 color_abgr = 7;
  double rotation_radians = 8; // CCW rotation of the radius axes about the center. Added in schema v2.
}
