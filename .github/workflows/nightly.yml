name: Nightly Build

on:
  push:
    branches: [ "main" ]

# Automatically cancel any previous runs for this workflow on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-nightly:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        # Full history for our own repo so `git rev-list --count HEAD` yields the true build
        # number (a shallow clone reports 1). fetch-depth propagates to submodules, so we do
        # NOT let checkout fetch them here; they are pulled shallow (pinned) in the next step.
        fetch-depth: 0
        submodules: false

    - name: Checkout submodules (shallow, pinned)
      # External dependencies: only the pinned commit, depth 1, to keep checkout fast.
      run: git submodule update --init --recursive --depth 1

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Prepare libpng config header
      shell: pwsh
      run: |
        $src = "code-external/libpng-code/scripts/pnglibconf.h.prebuilt"
        $dst = "code-external/libpng-code/pnglibconf.h"
        if (!(Test-Path $dst)) {
          Copy-Item $src $dst
        }

    - name: Cache Protobuf Build
      # Without this caching step, build was taking around 15 minutes. Just for this step!
      id: cache-protobuf
      uses: actions/cache@v4
      with:
        path: build/protobuf-x64-release
        # Creates a unique cache key based on the OS and the contents of Protobuf's CMakeLists.txt
        key: ${{ runner.os }}-protobuf-x64-release-mt-v2-${{ hashFiles('code-external/protobuf/CMakeLists.txt') }}

    # 2. UPDATE YOUR EXISTING BUILD STEP WITH AN 'if' CONDITION
    - name: Build Protobuf and Fetch Abseil
      if: steps.cache-protobuf.outputs.cache-hit != 'true'
      run: |
        # Configure Protobuf. The two new flags force CMake and Protobuf to use /MD (MultiThreaded)
        cmake -S code-external/protobuf -B build/protobuf-x64-release -Dprotobuf_BUILD_TESTS=OFF `
          -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
          -DCMAKE_BUILD_TYPE=Release -Dprotobuf_MSVC_STATIC_RUNTIME=ON `
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded -DCMAKE_CXX_STANDARD=20 `
          -DCMAKE_CXX_FLAGS="/std:c++20"

        # Build Protobuf so the .lib files are ready for the linker. 
        # The /verbosity:minimal flag reduces the amount of output in the logs.
        cmake --build build/protobuf-x64-release --config Release -- /m /v:q /clp:ErrorsOnly

    - name: Cache MSDF Build Tools
      id: cache-msdf-tools
      uses: actions/cache@v4
      with:
        path: |
          code-external/zlib/build
          code-external/libpng-code/build
          code-external/freetype/build
          code-external/msdf-atlas-gen/build
        key: ${{ runner.os }}-msdf-tools-release-${{ hashFiles('code-miscellaneous/msdf_atlas_generator.bat', 'code-external/zlib/**/*.c', 'code-external/zlib/**/*.h', 'code-external/zlib/CMakeLists.txt', 'code-external/libpng-code/**/*.c', 'code-external/libpng-code/**/*.h', 'code-external/libpng-code/CMakeLists.txt', 'code-external/libpng-code/scripts/pnglibconf.h.prebuilt', 'code-external/freetype/CMakeLists.txt', 'code-external/freetype/include/**', 'code-external/freetype/src/**', 'code-external/msdf-atlas-gen/CMakeLists.txt', 'code-external/msdf-atlas-gen/msdf-atlas-gen/**', 'code-external/msdf-atlas-gen/msdfgen/**') }}

    - name: Cache VishwakarmaExternal Static Library
      id: cache-vishwakarma-external
      uses: actions/cache@v4
      with:
        path: |
          build/Release/External
          build/openssl-x64-release
        key: >-
          ${{ runner.os }}-vishwakarma-external-release-${{ hashFiles(
            'code-external/VishwakarmaExternal.vcxproj',
            'code-miscellaneous/BuildOpenSSL.ps1',
            'code-external/sqlite/sqlite3.c',
            'code-external/sqlite/sqlite3.h',
            'code-external/lunasvg/include/**',
            'code-external/lunasvg/source/**',
            'code-external/lunasvg/plutovg/include/**',
            'code-external/lunasvg/plutovg/source/**',
            'code-external/libpng-code/*.c',
            'code-external/libpng-code/*.h',
            'code-external/libpng-code/scripts/pnglibconf.h.prebuilt',
            'code-external/zlib/*.c',
            'code-external/zlib/*.h',
            'code-external/freetype/include/**',
            'code-external/openssl/Configure',
            'code-external/openssl/VERSION.dat',
            'code-external/openssl/build.info',
            'code-external/openssl/Configurations/**',
            'code-external/openssl/include/**',
            'code-external/openssl/crypto/**',
            'code-external/openssl/ssl/**',
            'code-external/openssl/providers/**',
            'code-external/fast_float/include/**',
            'code-external/fast_float_wrapper.h',
            'code-external/fast_float_wrapper.cpp'
          ) }}
        restore-keys: |
          ${{ runner.os }}-vishwakarma-external-release-

    # OpenSSL's Windows Configure step needs Perl; windows-latest runners include Perl by default.
    - name: Build VishwakarmaExternal Static Library
      if: steps.cache-vishwakarma-external.outputs.cache-hit != 'true'
      run: msbuild code-external/VishwakarmaExternal.vcxproj /p:Configuration=Release /p:Platform=x64 /m

    - name: Install System Dependencies (FontForge & CLOC)
      shell: pwsh
      run: |
        # Install everything at once
        choco install fontforge cloc -y --no-progress

        # Expose FontForge to subsequent steps
        $ffPath = "C:\Program Files\FontForgeBuilds\bin"
        Add-Content -Path $env:GITHUB_PATH -Value $ffPath
        $env:PATH += ";$ffPath"
        fontforge -version
    
    - name: Setup Python and Install Dependencies
      uses: actions/setup-python@v5
      with:
        python-version: '3.x' # This will always grab the latest stable minor release of Python 3
        # We shall freeze version ONLY when we have a specific reason to do so. For now, we want the latest stable version of Python 3.
        cache: 'pip' 
    - name: Install Pip Packages
      run: pip install fonttools svgpathtools cu2qu pillow

    - name: Build icon font
      run: |
        python code-miscellaneous/build_icon_font.py
    - name: Upload generated font
      uses: actions/upload-artifact@v4
      with:
        name: generated-font
        path: Fonts/*.ttf

    # Builds Vishwakarma.exe + VishwakarmaSetup.exe, signs both with MV-CodeSigner-01.pfx,
    # and produces Vishwakarma_UserSetup_win10_win11_x64.exe + Vishwakarma_release_details.json
    # + .sig (Ed25519). Without the RELEASE_SIGN_PASSWORD secret everything is built unsigned.
    - name: Build, Sign and Package Release
      env:
        RELEASE_SIGN_PASSWORD: ${{ secrets.RELEASE_SIGN_PASSWORD }}
        RELEASE_SIGN_PFX_B64: ${{ secrets.RELEASE_SIGN_PFX_B64 }}
      shell: pwsh
      run: powershell -NoProfile -ExecutionPolicy Bypass -File code-miscellaneous/GenerateRelease.ps1 -Mode Package -Configuration Release

    # DEBUG STEP: Verify the files actually exist
    - name: Verify Release Files Exist
      shell: pwsh
      run: |
        $setup = Get-ChildItem "build/Release/Vishwakarma_UserSetup_win10_win11_x64.exe"
        if ($setup -and (Test-Path "build/Release/Vishwakarma_release_details.json")) {
            Write-Host "Release files found: $($setup.Name)"
        } else {
            Write-Error "Setup exe or release manifest NOT found in build/Release/"
            Get-ChildItem build/Release
            exit 1
        }

    - name: Count Lines of Code
      shell: pwsh
      run: |
        cloc . --exclude-dir=code-external,build,.git `
          --include-ext=cpp,h,hpp,hlsl,md,css,js,html `
          --json --quiet --out=cloc.json

    - name: Generate LOC Badge XML
      shell: pwsh
      run: |
        $json = Get-Content cloc.json | ConvertFrom-Json
        $loc = $json.SUM.code

        $svg = @(
          '<svg xmlns="http://www.w3.org/2000/svg" width="160" height="20">',
          '  <linearGradient id="a" x2="0" y2="100%">',
          '    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>',
          '    <stop offset="1" stop-opacity=".1"/>',
          '  </linearGradient>',
          '  <rect rx="3" width="160" height="20" fill="#555"/>',
          '  <rect rx="3" x="80" width="80" height="20" fill="#007ec6"/>',
          '  <path fill="#007ec6" d="M80 0h4v20h-4z"/>',
          '  <rect rx="3" width="160" height="20" fill="url(#a)"/>',
          '  <g fill="#fff" text-anchor="middle"',
          '     font-family="Geneva,DejaVu Sans,sans-serif"',
          '     font-size="11">',
          '    <text x="40" y="14">LOC</text>',
          "    <text x=""120"" y=""14"">$loc</text>",
          '  </g>',
          '</svg>'
        )
        $svg | Out-File loc-badge.svg -Encoding utf8

    - name: Generate LOC JSON
      shell: pwsh
      run: |
        # Read cloc output
        $clocData = Get-Content cloc.json | ConvertFrom-Json
        $loc = $clocData.SUM.code
        
        # Create Shields.io compliant JSON schema
        $endpointData = @{
            schemaVersion = 1
            label = "LOC"
            message = $loc.ToString()
            color = "blue"
        }
        
        # Save to loc.json
        $endpointData | ConvertTo-Json -Compress | Out-File loc.json -Encoding utf8

    - name: Publish badge branch
      shell: pwsh
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # Create fresh orphan branch
        git checkout --orphan ci
        # Remove everything from git index (not working directory)
        git rm -rf . --ignore-unmatch
        # Now only add the badge file
        git add loc-badge.svg loc.json
        git commit -m "Update LOC badge"
        git push origin ci --force
        
    # Use GitHub CLI to cleanly wipe the old release and create a new one
    - name: Publish Nightly Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: pwsh
      run: |
        gh release delete nightly --cleanup-tag -y || echo "No existing nightly release to delete"
        # Create the new release and upload the setup exe (stable name, so the website Download
        # button URL never changes), the signed manifest and its Ed25519 signature.
        $assets = @(
          "build/Release/Vishwakarma_UserSetup_win10_win11_x64.exe",
          "build/Release/Vishwakarma_release_details.json"
        )
        if (Test-Path "build/Release/Vishwakarma_release_details.json.sig") {
          $assets += "build/Release/Vishwakarma_release_details.json.sig"
        }
        gh release create nightly `
          @assets `
          --title "Nightly Build" `
          --notes "Latest development build, automatically generated." `
          --prerelease

